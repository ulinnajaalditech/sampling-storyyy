<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/favicon.png" />
    <title>App</title>

    <script type="module" src="/scripts/index.js"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <header
      class="border-b py-5 fixed top-0 left-0 right-0 w-full bg-background z-50"
    >
      <nav class="flex items-center justify-between container mx-auto">
        <p class="font-bold">Storyyy</p>
        <button
          id="skip-to-content-button"
          tabindex="0"
          class="btn btn-primary absolute -top-20 -left-20 focus-visible:top-0 focus-visible:left-0"
        >
          Skip To Content
        </button>
        <button
          id="hamburger-button"
          class="btn btn-secondary block md:hidden!"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
        <div
          id="mobile-navigation-drawer"
          aria-hidden="true"
          class="max-w-sm p-2 flex flex-col gap-5 w-full md:hidden h-screen bg-white absolute top-0 transition-all -right-100"
        >
          <button
            id="mobile-drawer-close"
            title="Tutup Drawer"
            class="btn btn-secondary w-fit"
          >
            X
          </button>
          <div id="mobile-navigation-drawer-content"></div>
        </div>
        <div
          id="navigation-drawer"
          class="hidden md:flex items-center gap-2"
        ></div>
      </nav>
    </header>

    <main id="main-content" class="main-content"></main>
    <footer class="border-t py-5">
      <p class="text-center text-sm text-gray-500">
        &copy; Make with ❤️ by Livesession Ulinnaja
      </p>
    </footer>
  </body>
</html>
